 cft_era_hardship_modifier:0 "Era of Hardship"
 cft_era_hardship_modifier_desc:0 "The realm struggles against adversity. Vassals are discontent, factions grow bolder, and construction costs rise as resources are diverted to survival."
 cft_era_golden_modifier:0 "Golden Age"
 cft_era_golden_modifier_desc:0 "The realm prospers under unified leadership. Vassals are content, factions lack support, and development flourishes."
 cft_era_corruption_modifier:0 "Age of Corruption"
 cft_era_corruption_modifier_desc:0 "Luxury and complacency erode the bonds of loyalty. Tax revenue declines, factions gain strength, and control over territories weakens."
 cft_era_dust_modifier:0 "Era of Dust"
 cft_era_dust_modifier_desc:0 "The old order collapses. Tax collection fails, levies dwindle, and territorial control crumbles as cohesion vanishes entirely."