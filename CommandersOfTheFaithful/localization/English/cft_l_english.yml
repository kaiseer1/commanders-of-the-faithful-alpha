 # Events - Era Change Notification (cft.0002)
 cft_era_change_title:0 "The Cycle Turns"
 cft_era_change_desc_hardship:0 "Your realm enters the #Y Hardship#! era. Through struggle and adversity, your dynasty's cohesion shall be forged in fire. The faithful band together against common foes."
 cft_era_change_desc_golden:0 "Your realm enters the #G Golden Age#!. Prosperity and unity reign as your dynasty reaches the peak of its power. Yet beware—the seeds of decline are sown in times of plenty."
 cft_era_change_desc_corruption:0 "Your realm enters the #R Corruption#! era. Luxury and complacency erode the bonds that once held your followers together. Factions stir in the shadows."
 cft_era_change_desc_dust:0 "Your realm enters the #D Dust#! era. The old order crumbles as cohesion fades to nothing. Only through collapse can rebirth begin anew."
 cft_era_change_option_ok:0 "So it is written."
 
 # Events - Examine Asabiyyah (cft.0003)
 cft_examine_title:0 "The State of Our Cohesion"
 cft_examine_desc_era1:0 "#Y HARDSHIP#!\nWe stand in an age of struggle. Our people are bound together by necessity and shared hardship. Each challenge we face strengthens our bonds."
 cft_examine_desc_era2:0 "#G GOLDEN AGE#!\nOur realm flourishes. Unity and prosperity mark this golden time, yet we must remain vigilant against the softening effects of comfort."
 cft_examine_desc_era3:0 "#R CORRUPTION#!\nDecay sets in. The virtues that built our power fade as luxury takes hold. Faction and self-interest threaten to tear us apart."
 cft_examine_desc_era4:0 "#D DUST#!\nThe old order crumbles. What once was strong has grown weak. Yet from dust, new beginnings may arise—for those who survive."
 cft_examine_band_high:0 "\n\n#V Asabiyyah Level: HIGH#!\nOur cohesion nears its peak. A transition approaches—whether to greater glory or deeper decay depends on our current state."
 cft_examine_band_mid:0 "\n\n#V Asabiyyah Level: MODERATE#!\nOur bonds hold steady, neither strengthening nor weakening significantly. The cycle continues its inexorable turn."
 cft_examine_band_low:0 "\n\n#V Asabiyyah Level: LOW#!\nOur cohesion is weak. We are vulnerable to internal strife and external threats. Strong leadership is needed to restore unity."
 cft_examine_ok:0 "I understand."
 
